name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Zip Chrome extension
        run: zip -r "intention-chrome-v${{ steps.version.outputs.VERSION }}.zip" "Intention Chrome/"

      - name: Zip Firefox extension
        run: zip -r "intention-firefox-v${{ steps.version.outputs.VERSION }}.zip" "Intention Firefox/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            intention-chrome-v${{ steps.version.outputs.VERSION }}.zip
            intention-firefox-v${{ steps.version.outputs.VERSION }}.zip
