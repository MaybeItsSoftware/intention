name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: |
          echo "Installing test dependencies..."
          npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run Preflight Checks and Package Extensions
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/intention-chrome-v${{ steps.version.outputs.VERSION }}.zip
            build/intention-firefox-v${{ steps.version.outputs.VERSION }}.zip

      # =========================================================================
      # AUTOMATED STOREFRONT DEPLOYMENTS (FOR DEVOPS)
