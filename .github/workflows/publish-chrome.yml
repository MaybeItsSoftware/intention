name: Publish to Chrome Web Store

# Uploads a draft build to the Chrome Web Store on every vX.Y tag push,
# provided CHROME_* secrets are configured (see DEPLOYMENT.md). This only
# primes the new version in the dashboard — it does not submit it for
# review; do that manually when ready. Skips gracefully — without failing
# the run — if secrets are missing.

on:
  workflow_run:
    workflows: ["Automated Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

jobs:
  check-release:
    name: Check a release happened
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check.outputs.released }}
      sha: ${{ steps.check.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Was the commit Release just left on main tagged as a release?
        id: check
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          elif git describe --tags --exact-match HEAD 2>/dev/null | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  chrome:
    name: Publish to Chrome Web Store
    needs: check-release
    if: needs.check-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-release.outputs.sha }}

      - name: Check secrets configured
        id: check
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          if [[ -n "$CHROME_EXTENSION_ID" && -n "$CHROME_CLIENT_ID" && -n "$CHROME_CLIENT_SECRET" && -n "$CHROME_REFRESH_TOKEN" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Chrome Web Store secrets not configured — skipping publish. See DEPLOYMENT.md."
          fi

      - name: Zip Chrome extension
        if: steps.check.outputs.configured == 'true'
        run: (cd "Intention Chrome" && zip -r -q "../intention-chrome.zip" . -x "env.txt" "*.DS_Store")

      - name: Upload to Chrome Web Store (draft only, not submitted for review)
        if: steps.check.outputs.configured == 'true'
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: intention-chrome.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: false
