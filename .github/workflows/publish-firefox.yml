name: Publish to Firefox Add-ons (AMO)

# Auto-submits to AMO on every vX.Y tag push, provided AMO_* secrets are
# configured (see DEPLOYMENT.md). Skips gracefully — without failing the
# run — if secrets are missing.

on:
  workflow_run:
    workflows: ["Automated Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

jobs:
  check-release:
    name: Check a release happened
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check.outputs.released }}
      sha: ${{ steps.check.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Was the commit Release just left on main tagged as a release?
        id: check
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          elif git describe --tags --exact-match HEAD 2>/dev/null | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  firefox:
    name: Publish to Firefox Add-ons (AMO)
    needs: check-release
    if: needs.check-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-release.outputs.sha }}

      - name: Check secrets configured
        id: check
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [[ -n "$AMO_JWT_ISSUER" && -n "$AMO_JWT_SECRET" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AMO secrets not configured — skipping publish. See DEPLOYMENT.md."
          fi

      - name: Setup Node.js
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install deploy tooling
        if: steps.check.outputs.configured == 'true'
        run: npm install

      - name: Lint, sign, and submit to AMO
        if: steps.check.outputs.configured == 'true'
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          echo '{"version": {"license": "MIT"}, "categories": {"firefox": ["other"]}}' > /tmp/amo-metadata.json
          npx web-ext sign \
            --source-dir="Intention Firefox" \
            --artifacts-dir=build \
            --channel=listed \
            --ignore-files env.txt \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET" \
            --amo-metadata=/tmp/amo-metadata.json
