name: Publish to Google Play

# Auto-publishes a Google Play internal release on every vX.Y tag push,
# provided the ANDROID_*/GOOGLE_PLAY_* secrets are configured (see
# DEPLOYMENT.md). Skips gracefully — without failing the run — if secrets
# are missing.

on:
  workflow_run:
    workflows: ["Automated Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

jobs:
  check-release:
    name: Check a release happened
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check.outputs.released }}
      sha: ${{ steps.check.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Was the commit Release just left on main tagged as a release?
        id: check
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          elif git describe --tags --exact-match HEAD 2>/dev/null | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  android:
    name: Publish to Google Play
    needs: check-release
    if: needs.check-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-release.outputs.sha }}

      - name: Check secrets configured
        id: check
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" && -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Google Play secrets not configured — skipping publish. See DEPLOYMENT.md."
          fi

      - name: Set up JDK
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decode signing keystore
        if: steps.check.outputs.configured == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/upload-keystore.jks

      - name: Build signed release bundle
        if: steps.check.outputs.configured == 'true'
        env:
          ANDROID_KEYSTORE_PATH: /tmp/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd "Intention Android"
          chmod +x ./gradlew
          ./gradlew bundleRelease

      - name: Upload & publish to Google Play
        if: steps.check.outputs.configured == 'true'
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: uk.co.maybeitssoftware.intention
          releaseFiles: Intention Android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
