<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // Custom chrome mock specifically for the Background Worker WebView
    (function() {
      const listeners = [];
      
      window.AndroidCallbacks = {
        _nextId: 1,
        _registry: {},
        register: function(callback) {
          if (!callback) return "";
          const id = "bg_cb_" + (this._nextId++);
          this._registry[id] = callback;
          return id;
        },
        invoke: function(id, resultJson) {
          if (this._registry[id]) {
            try {
              const parsed = resultJson ? JSON.parse(resultJson) : null;
              this._registry[id](parsed);
            } catch (e) {
              console.error("[BackgroundJS] Error invoking callback " + id, e);
              this._registry[id](resultJson);
            }
            delete this._registry[id];
          }
        }
      };

      window.chrome = {
        runtime: {
          onMessage: {
            addListener: function(listener) {
              listeners.push(listener);
            }
          },
          onInstalled: {
            addListener: function(listener) {
              // Trigger it immediately so rules are initialized
              setTimeout(listener, 0);
            }
          },
          getURL: function(path) {
            return "file:///android_asset/" + path;
          },
          openOptionsPage: function() {
            // No-op or trigger intent to MainActivity
          }
        },
        action: {
          onClicked: {
            addListener: function(listener) {}
          }
        },
        tabs: {
          onRemoved: {
            addListener: function(listener) {}
          },
          remove: function(tabId) {
            // No-op or tell Android to close the overlay
          }
        },
        alarms: {
          onAlarm: {
            addListener: function(listener) {
              window.alarmListener = listener;
            }
          },
          create: function(name, info) {
            AndroidInterface.createAlarm(name, JSON.stringify(info));
          },
          clear: function(name) {
            AndroidInterface.clearAlarm(name);
          }
        },
        storage: {
          local: {
            get: function(keys, callback) {
              const cbId = window.AndroidCallbacks.register(callback);
              const keysStr = typeof keys === 'string' ? JSON.stringify([keys]) : JSON.stringify(keys);
              AndroidInterface.getStorage(keysStr, cbId);
            },
            set: function(items, callback) {
              const cbId = window.AndroidCallbacks.register(callback);
              AndroidInterface.setStorage(JSON.stringify(items), cbId);
            }
          }
        },
        declarativeNetRequest: {
          getDynamicRules: function() { return Promise.resolve([]); },
          updateDynamicRules: function() { return Promise.resolve(); },
          updateSessionRules: function() { return Promise.resolve(); }
        }
      };

      // Native triggers this to invoke listeners registered in background.js
      window.triggerMessage = function(messageJson, senderJson, callbackId) {
        const message = JSON.parse(messageJson);
        const sender = JSON.parse(senderJson);
        let responded = false;
        
        const sendResponse = function(response) {
          if (responded) return;
          responded = true;
          AndroidInterface.onMessageResponse(callbackId, JSON.stringify(response));
        };

        for (const listener of listeners) {
          const isAsync = listener(message, sender, sendResponse);
          // If the listener returns true, it intends to call sendResponse asynchronously.
          if (!isAsync && !responded) {
            sendResponse(null);
          }
        }
      };
    })();
  </script>
  <!-- Load the shared business logic scripts -->
  <script src="providers.js"></script>
  <script src="prompts.js"></script>
  <script src="tracking.js"></script>
  <script src="background.js"></script>
</head>
<body>
</body>
</html>
